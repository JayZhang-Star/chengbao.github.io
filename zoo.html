        /* --- 全局护眼样式 --- */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #fdf6e3;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #d33682;
            font-size: 2.2em;
            margin-bottom: 25px;
        }

        /* --- 主题切换按钮区：支持横向滚动 --- */
        .theme-buttons {
            margin-bottom: 30px;
            padding-bottom: 10px;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
        }

        .theme-btn {
            background-color: #2aa198;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1.1em;
            margin: 5px;
            border-radius: 20px;
            cursor: pointer;
            transition: transform 0.2s;
            display: inline-block;
        }

        .theme-btn:hover {
            transform: scale(1.05);
            background-color: #219187;
        }

        .theme-btn.active {
            background-color: #cb4b16;
        }

        /* --- 单词卡片网格 --- */
        .word-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* --- 单个单词卡片样式 --- */
        .word-card {
            background-color: white;
            border-radius: 18px;
            padding: 20px 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s;
            user-select: none;
        }

        .word-card:active {
            transform: scale(0.95);
        }

        .word-emoji {
            font-size: 3.5em;
            margin-bottom: 8px;
            line-height: 1;
        }

        .word-text {
            font-size: 1.6em;
            font-weight: bold;
            color: #073642;
            margin: 5px 0;
        }

        .word-chinese {
            font-size: 1.1em;
            color: #657b83;
        }

        .hint {
            color: #93a1a1;
            margin-top: 25px;
            font-size: 0.95em;
        }
    </style>
</head>

        // --- 2. 初始化优选语音包：中文女声优先 ---
        function initVoices() {
            const voices = window.speechSynthesis.getVoices();
            // 中文语音优选规则：优先选清晰女声，适配全浏览器
            const zhPriority = ['Microsoft Huihui', 'Microsoft Yaoyao', 'Google 普通话', 'zh-CN'];
            // 英文语音优选规则：美式女声，适配幼儿启蒙
            const enPriority = ['Microsoft Jenny', 'Google US English', 'en-US'];

            // 匹配中文语音
            for (let name of zhPriority) {
                const findVoice = voices.find(voice => voice.name.includes(name) && voice.lang.includes('zh-CN'));
                if (findVoice) {
                    zhVoice = findVoice;
                    break;
                }
            }

            // 匹配英文语音
            for (let name of enPriority) {
                const findVoice = voices.find(voice => voice.name.includes(name) && voice.lang.includes('en-US'));
                if (findVoice) {
                    enVoice = findVoice;
                    break;
                }
            }
        }

        // 监听语音加载完成，执行初始化
        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = initVoices;
        }

        // --- 3. 核心发音功能：先读中文，再读英文 ---
        function speakBilingual(enText, zhText) {
            if (!('speechSynthesis' in window)) {
                alert('您的浏览器不支持语音功能，请使用 Chrome、Edge 或 Safari 浏览器！');
                return;
            }

            speechSynthesis.cancel(); // 停止当前播放，避免声音叠加

            // 第一步：先读中文
            const utteranceZh = new SpeechSynthesisUtterance(zhText);
            utteranceZh.lang = 'zh-CN';
            utteranceZh.rate = 0.9; // 中文语速适中，适合幼儿
            utteranceZh.pitch = 1.1; // 音调柔和
            if (zhVoice) utteranceZh.voice = zhVoice; // 绑定优选女声

            // 第二步：中文读完后，自动读英文
            utteranceZh.onend = () => {
                const utteranceEn = new SpeechSynthesisUtterance(enText);
                utteranceEn.lang = 'en-US';
                utteranceEn.rate = 0.8; // 英文慢速，清晰易懂
                utteranceEn.pitch = 1.1;
                if (enVoice) utteranceEn.voice = enVoice; // 绑定优选美式女声
                speechSynthesis.speak(utteranceEn);
            };

            speechSynthesis.speak(utteranceZh);
        }

        // --- 4. 渲染单词卡片 ---
        function renderWords(theme) {
            const container = document.getElementById('wordContainer');
            const data = wordData[theme];
            container.innerHTML = '';

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'word-card';
                card.onclick = () => speakBilingual(item.en, item.zh);

                card.innerHTML = `
                    <div class="word-emoji">${item.emoji}</div>
                    <div class="word-text">${item.en}</div>
                    <div class="word-chinese">${item.zh}</div>
                `;

                container.appendChild(card);
            });
        }

        // --- 5. 切换主题 ---
        function switchTheme(theme, btnElement) {
            const buttons = document.querySelectorAll('.theme-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            renderWords(theme);
        }

        // --- 6. 页面初始化 ---
        window.onload = () => renderWords('numbers');
