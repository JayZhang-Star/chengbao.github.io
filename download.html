<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APK 下载</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .app-info {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
        }
        .app-info p {
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .app-name {
            font-weight: 600;
            color: #333;
            font-size: 16px;
        }
        .download-btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 14px 40px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        .download-btn:active {
            transform: translateY(0);
        }
        .file-size {
            color: #999;
            font-size: 12px;
            margin-top: 10px;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }
        .back-link:hover {
            color: #764ba2;
        }
        .download-options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        .ios-btn {
            background: linear-gradient(135deg, #34C759 0%, #30B0C0 100%);
            box-shadow: 0 4px 15px rgba(52, 199, 89, 0.4);
        }
        .ios-btn:hover {
            box-shadow: 0 6px 20px rgba(52, 199, 89, 0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 火狐浏览器下载</h1>   
    
        
        <div class="download-options">
            <div>
                <p style="color: #666; margin-bottom: 12px; font-size: 14px;">🤖 安卓版本</p>
                <a href="https://ftp.mozilla.org/pub/fenix/releases/148.0.2/android/fenix-148.0.2-android/fenix-148.0.2.multi.android-universal.apk" download class="download-btn">
                    ⬇️ 点击下载安装[安卓火狐浏览器]
                </a>
                <p class="file-size">Android 5.0+ 推荐</p>
            </div>
            
            <div>
                <p style="color: #666; margin-bottom: 12px; font-size: 14px;">🍎 iOS版本</p>
                <a href="https://apps.apple.com/cn/app/firefox/id989804926" target="_blank" class="download-btn ios-btn">
                    ⬇️ 点击下载安装[iOS火狐浏览器]
                </a>
                <p class="file-size">从App Store下载 iOS 12.0+</p>
            </div>
        </div>
        
        <a href="index.html" class="back-link">← 返回主页</a>
    </div>
</body>
</html>
